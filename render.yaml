databases:
  - name: shruhi-portal-db
    plan: free

services:
  - type: web
    name: shruhi-portal-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shruhi-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: shruhi-portal-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: shruhi-portal-api
          property: hostport
          # Render's blueprint substitutes this with the live API URL at build
          # time. If your Render plan/version doesn't support fromService here,
          # just hardcode the API's onrender.com URL after the first deploy.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
