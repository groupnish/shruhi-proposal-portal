# Frontend is no longer deployed here — it now lives on GitHub Pages
# (see .github/workflows/deploy-pages.yml). This blueprint only manages
# the database and API.
databases:
  - name: shruhi-portal-db
    plan: free

services:
  - type: web
    name: shruhi-portal-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shruhi-portal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set these manually in the Render dashboard (Environment tab) if you
      # want the admin account auto-seeded on boot — see README.
      # ADMIN_EMAIL, ADMIN_NAME, ADMIN_PASSWORD (optional)
